<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Onur Çay Evi — Geleneksel Türk Çayı, Kahvesi ve lezzetli atıştırmalıklar. Dijital menümüzü keşfedin.">
  <meta name="theme-color" content="#3d1c06">
  <title>Onur Çay Evi — Menü</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════ -->
  <header class="site-header">
    <div class="hero-section">
      <div class="logo-wrapper">
        <div class="logo-icon" id="logo-icon">🍵</div>
        <h1 class="brand-name" data-setting="name">Onur Çay Evi</h1>
        <div class="brand-sub-line">
          <hr><span class="brand-subtitle" data-setting="subtitle">Geleneksel Türk Çayı</span><hr>
        </div>
        <div class="hero-info">
          <span class="hero-info-item" id="hero-phone-wrap">📞 <span id="hero-phone"></span></span>
          <span class="hero-info-item" id="hero-addr-wrap">📍 <span id="hero-address"></span></span>
          <span class="hero-info-item" id="hero-hours-wrap">🕐 <span id="hero-hours"></span></span>
        </div>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       ARAMA
  ═══════════════════════════════════════════ -->
  <div class="search-wrapper">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="Ürün veya içecek ara..."
        autocomplete="off"
        aria-label="Menüde ara"
      >
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       MENÜ
  ═══════════════════════════════════════════ -->
  <main>

    <!-- Kategori sekmeleri -->
    <nav id="category-nav" class="category-nav" aria-label="Menü kategorileri"></nav>

    <!-- Ürün listesi -->
    <div id="menu-container" aria-live="polite"></div>

    <!-- Sonuç yok -->
    <div id="no-results">
      <div class="empty-icon">🔍</div>
      <h3>Sonuç bulunamadı</h3>
      <p style="font-size:14px;margin-top:4px">Farklı bir arama terimi deneyin.</p>
    </div>

  </main>

  <!-- ═══════════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════════ -->
  <footer class="site-footer">
    <div class="footer-brand" id="footer-brand">Onur Çay Evi</div>
    <div class="footer-contact" id="footer-contact"></div>
    <p class="footer-copy">© 2024 Onur Çay Evi — Tüm Hakları Saklıdır</p>
  </footer>

  <!-- Admin köşe butonu -->
  <a href="admin.html" class="admin-float-btn" title="Yönetici">⚙️</a>

  <script src="js/menu.js?v=2"></script>
</body>
</html>

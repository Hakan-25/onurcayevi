<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Onur Çay Evi - Geleneksel Türk Çayı ve Kahvesi. Menümüzü keşfedin.">
  <meta name="theme-color" content="#1a0a00">
  <title>Onur Çay Evi — Menü</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">

  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

  <!-- ══════════════ HEADER ══════════════ -->
  <header class="site-header" role="banner">
    <div class="hero-section">
      <div class="hero-bg"></div>
      <div class="hero-pattern"></div>

      <div class="logo-wrapper">
        <div class="logo-icon" id="logo-icon">🍵</div>
        <div class="brand-name" data-setting="name">Onur Çay Evi</div>
        <div class="hero-divider"></div>
        <div class="brand-subtitle" data-setting="subtitle">Geleneksel Türk Çayı</div>

        <div class="hero-info">
          <div class="hero-info-item" style="display:none">
            <span>📞</span>
            <span id="hero-phone"></span>
          </div>
          <div class="hero-info-item" style="display:none">
            <span>📍</span>
            <span id="hero-address"></span>
          </div>
          <div class="hero-info-item" style="display:none">
            <span>🕐</span>
            <span id="hero-hours"></span>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- ══════════════ ARAMA ══════════════ -->
  <div class="search-wrapper" role="search">
    <div class="search-box">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input
        type="search"
        id="search-input"
        class="search-input"
        placeholder="Ürün ara..."
        aria-label="Menüde ara"
        autocomplete="off"
      >
    </div>
  </div>

  <!-- ══════════════ ANA İÇERİK ══════════════ -->
  <main role="main">

    <!-- KATEGORİ SEKMELER -->
    <nav id="category-nav" class="category-nav" role="navigation" aria-label="Menü kategorileri">
      <!-- JS tarafından doldurulur -->
    </nav>

    <!-- MENÜ KONTEYNERİ -->
    <div id="menu-container" aria-live="polite">
      <!-- JS tarafından doldurulur -->
    </div>

    <!-- SONUÇ YOK -->
    <div id="no-results" role="status" aria-live="polite">
      <div class="empty-state-icon">🔍</div>
      <h3>Sonuç bulunamadı</h3>
      <p>Farklı bir arama terimi deneyin.</p>
    </div>

  </main>

  <!-- ══════════════ FOOTER ══════════════ -->
  <footer class="site-footer" role="contentinfo">
    <div class="footer-brand" id="footer-brand">Onur Çay Evi</div>
    <div class="footer-contact">
      <a href="tel:" id="footer-phone" class="footer-contact-item">
        <span>📞</span> <span></span>
      </a>
      <span class="footer-contact-item" style="color:rgba(253,233,160,.6);font-size:13px;display:flex;align-items:center;gap:6px">
        <span>📍</span>
        <span id="footer-address"></span>
      </span>
    </div>
    <p class="footer-copy">© 2024 Onur Çay Evi — Tüm Hakları Saklıdır</p>
  </footer>

  <!-- ADMİN GİRİŞ BUTONU (sadece admin bilirse kullanır) -->
  <a href="admin.html" class="admin-float-btn" id="admin-float-btn" title="Yönetici Girişi" aria-label="Yönetici Girişi">
    ⚙️
  </a>

  <!-- SCRIPT -->
  <script src="js/menu.js"></script>

</body>
</html>
